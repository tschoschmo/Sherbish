<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>glyph view</title>
<style>
  body { margin: 0; background: #fff; display: flex; gap: 18px; flex-wrap: wrap; padding: 24px; align-items: flex-start; }
  figure { margin: 0; text-align: center; font: 13px system-ui, sans-serif; color: #444; }
  img { width: 220px; height: 220px; border: 1px solid #ddd; display: block; }
</style>
</head>
<body>
<script>
  var gs = (new URLSearchParams(location.search).get('g') || 's').split(',');
  document.body.innerHTML = gs.map(function (g) {
    return '<figure><img src="glyphs/' + g + '.svg?t=' + Date.now() + '"><figcaption>' + g + '</figcaption></figure>';
  }).join('');
</script>
</body>
</html>
